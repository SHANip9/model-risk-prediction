<!DOCTYPE html>
<html>
<head>
    <title>Gig Worker Risk Heatmap - OmniSight AI</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; }
        #map { height: 600px; width: 100%; }
        .info { padding: 6px 8px; font: 14px/16px Arial; background: white; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .legend { line-height: 18px; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; }
    </style>
</head>
<body>
    <h1>Gig Worker Risk Heatmap (20 Pan-India Zones)</h1>
    <p>Mumbai · Delhi · Kolkata · Chennai — 5 zones each. Colors: <span style="color:#16a34a">SAFE</span> &lt;50, <span style="color:#f59e0b">CAUTION</span> 50-74, <span style="color:#dc2626">DANGER</span> &ge;75.</p>
    <div id="map"></div>

    <script>
        const API_BASE = 'http://localhost:8000';  // uvicorn api.app:app --reload
        const map = L.map('map').setView([22.5, 80.0], 5);  // India center

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<i style="background:#16a34a"></i> SAFE (&lt;50)<br>' +
                            '<i style="background:#f59e0b"></i> CAUTION (50-74)<br>' +
                            '<i style="background:#dc2626"></i> DANGER (&ge;75)';
            return div;
        };
        legend.addTo(map);

        // Fetch live heatmap data from the backend
        fetch(`${API_BASE}/zones/risk/heatmap`)
            .then(r => r.json())
            .then(data => {
                data.zones.forEach(zone => {
                    const color = zone.color || (zone.risk_score >= 75 ? '#dc2626' : zone.risk_score >= 50 ? '#f59e0b' : '#16a34a');
                    L.circle(zone.center, {
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.7,
                        radius: 2000  // 2km approx zone
                    }).addTo(map).bindPopup(
                        `<b>${zone.display_name}</b> (${zone.city})<br>` +
                        `Risk: ${zone.risk_score.toFixed(1)} (${zone.risk_label || zone.risk_bin.toUpperCase()})<br>` +
                        `Condition: ${zone.condition}<br>` +
                        `Rain: ${zone.precip_mm} mm | Wind: ${zone.wind_kph} kph`
                    );
                });
            });

        // Click for nearest zone risk
        map.on('click', e => {
            fetch(`${API_BASE}/risk/risk/${e.latlng.lat}/${e.latlng.lng}`)
                .then(r => r.json())
                .then(data => {
                    L.popup().setLatLng(e.latlng).setContent(
                        `<b>${data.display_name}</b><br>Dist: ${data.distance_km.toFixed(2)}km<br>Risk: ${data.risk_score.toFixed(2)} (${data.risk_rank.toUpperCase()})`
                    ).openOn(map);
                });
        });
    </script>
</body>
</html>
